version: 2

seeds:
  - name: axie_collectible_collections_seed
    description: >
      (token_id, collection) membership for Ronin Axies, generated by
      scripts/export-collection-map.mjs (Sky Mavis `axies` search). One row per
      collection a token belongs to (multi-membership — a token in two
      collections has two rows). Loaded as a dbt seed and exposed by the
      axie_collectible_collections model.
    config:
      column_types:
        token_id: varchar
        collection: varchar
    columns:
      - name: token_id
        description: "Axie ERC-721 token id on Ronin."
      - name: collection
        description: "One of Origin, Mystic, Shiny, Japanese, Summer, Nightmare, Christmas, MEO."

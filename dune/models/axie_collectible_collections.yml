version: 2

models:
  - name: axie_collectible_collections
    meta:
      blockchain: ronin
      project: axie
      contributors: axie-dashboard
    config:
      tags: ['static', 'axie', 'ronin']
    description: >
      Maps a Ronin Axie ERC-721 token_id to the collectible collection(s) it
      belongs to (Origin, Mystic, Shiny, Japanese, Summer, Nightmare, Christmas,
      MEO). Seed-backed: collection membership derives from Axie genes/parts and
      is sourced from the Sky Mavis API. MULTI-MEMBERSHIP — a token appears once
      per collection it belongs to (an Axie can be in two, e.g. Christmas +
      Nightmare), matching how Sky Mavis counts each collection independently.
      Join to nft.trades / nft.transfers on token_id to attribute sales/holders;
      grouping by collection then counts each membership independently.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - token_id
            - collection
    columns:
      - name: token_id
        description: "Axie ERC-721 token id on Ronin (contract 0x32950db2a7164ae833121501c797d79e7b79d74c). Not unique on its own — a token may have several rows, one per collection."
        tests:
          - not_null
      - name: collection
        description: "A collectible collection the Axie belongs to (one of eight)."
        tests:
          - not_null
          - accepted_values:
              values: ['Origin', 'Mystic', 'Shiny', 'Japanese', 'Summer', 'Nightmare', 'Christmas', 'MEO']

# Example: add a subdomain for the dashboard on a VPS that already runs nginx.
# Replace dashboard.example.com, cert paths, and the upstream port if you changed
# docker-compose.proxy.yml (default: 127.0.0.1:8090).
#
#   sudo cp deploy/nginx.example.conf /etc/nginx/sites-available/axie-dashboard
#   sudo ln -s /etc/nginx/sites-available/axie-dashboard /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name dashboard.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dashboard.example.com;

    ssl_certificate     /etc/letsencrypt/live/dashboard.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
